<head>

<body>

  <!--
  ╔══════════════════════════════════════════════════════╗
  ║   FILL IN YOUR INFO BELOW — ONLY CHANGE THESE 7     ║
  ╠══════════════════════════════════════════════════════╣

  data-name       → Your full name
  data-initials   → First letters of your first + last name
  data-roll       → Your roll number
  data-dept       → Your department (BSSE / BSCS / BSIT)
  data-semester   → Your semester (e.g. Semester 4)
  data-github     → Your GitHub username (no @ sign)
  data-skills     → Your skills, comma separated
  data-gradient   → Pick a number 1 to 6 (your card color)

  ╚══════════════════════════════════════════════════════╝
  -->

  <div class="student"
    data-name="Umar testing fork branch"
    data-initials="AH"
    data-roll="4160032"
    data-dept="BSCS"
    data-semester="Semester 523"

    data-skills="HTML, CSS, JavaScript next js"
    data-gradient="1">
  </div>
