name: Update Student Directory

on:
  push:
    branches:
      - develop
    paths:
      - 'students/**.html'

jobs:
  update-directory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update student list in index.html
        run: |
          python3 - <<'PYTHON'
          import re, glob

          with open('index.html', 'r') as f:
              content = f.read()

          files = sorted(glob.glob('students/*.html'))
          files = [f for f in files if '_template' not in f]
          lines = '\n'.join(f"      '{f}'," for f in files)

          pattern = r'(// REGISTRY_START\n).*?(// REGISTRY_END)'
          replacement = f'// REGISTRY_START\n{lines}\n      // REGISTRY_END'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open('index.html', 'w') as f:
              f.write(new_content)

          print(f"Updated: {len(files)} students")
          PYTHON

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update student directory [skip ci]"
          git push origin HEAD:develop --force-with-lease
